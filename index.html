<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="https://frc-2928.github.io/battery-tracker/icon.svg">

    <link rel="manifest" href="manifest.json">  
    <title>FRC Battery Tracker + Logs</title>
    <style>
        :root {
            --primary: #2563eb;
            --accent: #f59e0b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }

        h1 { font-size: 1.2rem; margin: 0; color: var(--primary); }

        .battery-grid {
            display: grid;
            gap: 15px;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            margin-top: 10px;
        }

        /* --- Sidebar & Log Styles --- */
        #sidebar {
            position: fixed;
            right: -300px;
            top: 0;
            width: 280px;
            height: 100%;
            background: #fff;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            transition: 0.3s;
            z-index: 100;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        #sidebar.open { right: 0; }

        .log-container {
            flex-grow: 1;
            overflow-y: auto;
            border-top: 1px solid #eee;
            margin-top: 10px;
        }

        .log-entry {
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .log-content { flex-grow: 1; font-size: 0.85rem; }
        .log-time { color: #64748b; font-size: 0.7rem; display: block; }

        .delete-log-btn {
            background: none;
            border: none;
            color: #cbd5e1;
            font-size: 1.2rem;
            padding: 0 5px;
            cursor: pointer;
            line-height: 1;
        }

        .delete-log-btn:hover { color: var(--danger); }

        /* --- UI Elements --- */
        .battery-card {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-left: 6px solid var(--primary);
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-log { background: var(--accent); }
        .btn-clear { background: var(--danger); margin-top: 10px; font-size: 0.8rem; }
    </style>

    <!-- PWA service worker (don't remove or it will break PWA) -->
    <script>navigator.serviceWorker.register("service-worker.js")</script> 
</head>
<body>

    <div class="header-container">
        <h1>🔋 FRC Battery Tracker</h1>
        <button class="btn btn-log" onclick="toggleSidebar()">View Logs</button>
    </div>

    <div id="app" class="battery-grid"></div>

    <div id="sidebar">
        <h3>Activity Log</h3>
        <button class="btn" onclick="toggleSidebar()">Close</button>
        <div id="log-list" class="log-container"></div>
        <button class="btn btn-clear" onclick="clearAllLogs()">Clear All Logs</button>
    </div>

    <script>
        const batteryCount = 9;
        const app = document.getElementById('app');
        const logList = document.getElementById('log-list');

        let batteryData = JSON.parse(localStorage.getItem('frc_batteries')) || {};
        let activityLogs = JSON.parse(localStorage.getItem('frc_logs')) || [];

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function addLog(message) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            activityLogs.unshift({ id: Date.now(), time, message }); 
            saveAndRenderLogs();
        }

        function removeLog(logId) {
            activityLogs = activityLogs.filter(log => log.id !== logId);
            saveAndRenderLogs();
        }

        function clearAllLogs() {
            if(confirm("Delete all history?")) {
                activityLogs = [];
                saveAndRenderLogs();
            }
        }

        function saveAndRenderLogs() {
            localStorage.setItem('frc_logs', JSON.stringify(activityLogs));
            logList.innerHTML = activityLogs.map(log => `
                <div class="log-entry">
                    <div class="log-content">
                        <span class="log-time">${log.time}</span>
                        ${log.message}
                    </div>
                    <button class="delete-log-btn" onclick="removeLog(${log.id})">&times;</button>
                </div>
            `).join('');
        }

        function createCards() {
            for (let i = 1; i <= batteryCount; i++) {
                const data = batteryData[i] || { match: '', pre: '', post: '', notes: '' };
                const card = document.createElement('div');
                card.className = 'battery-card';
                card.innerHTML = `
                    <div style="font-weight:bold; margin-bottom:10px;">Battery #${i}</div>
                    <div class="input-group">
                        <div>
                            <label style="font-size:0.7rem">Match</label>
                            <input type="number" id="match-${i}" value="${data.match}" onchange="logChange(${i}, 'Match')">
                        </div>
                        <div>
                            <label style="font-size:0.7rem">Pre %</label>
                            <input type="number" id="pre-${i}" value="${data.pre}" onchange="logChange(${i}, 'Pre %')">
                        </div>
                        <div>
                            <label style="font-size:0.7rem">Post %</label>
                            <input type="number" id="post-${i}" value="${data.post}" onchange="logChange(${i}, 'Post %')">
                        </div>
                    </div>
                    <textarea id="notes-${i}" placeholder="Notes..." onchange="logChange(${i}, 'Notes')">${data.notes}</textarea>
                `;
                app.appendChild(card);
            }
        }

        window.logChange = (id, field) => {
            const inputId = field.toLowerCase().split(' ')[0];
            const val = document.getElementById(`${inputId}-${id}`).value;
            
            batteryData[id] = {
                match: document.getElementById(`match-${id}`).value,
                pre: document.getElementById(`pre-${id}`).value,
                post: document.getElementById(`post-${id}`).value,
                notes: document.getElementById(`notes-${id}`).value
            };
            
            localStorage.setItem('frc_batteries', JSON.stringify(batteryData));
            addLog(`Batt #${id}: ${field} -> ${val || 'empty'}`);
        };

        createCards();
        saveAndRenderLogs();
    </script>
</body>
</html>
